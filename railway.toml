[build]
builder = "nixpacks"
buildCommand = "apt-get update && apt-get install -y build-essential python3-dev && pip install --upgrade pip wheel setuptools && pip install -r requirements.txt"

[deploy]
startCommand = "streamlit run app/dashboard.py"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on-failure"

[nixpacks]
apt-pkgs = ["build-essential", "python3-dev", "gcc", "libc-dev"] 