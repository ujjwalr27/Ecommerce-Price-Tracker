[build]
builder = "nixpacks"
buildCommand = "pip install --no-cache-dir --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt"

[deploy]
startCommand = "streamlit run app/dashboard.py"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on-failure"

[nixpacks]
python_version = "3.9"
apt-pkgs = ["build-essential", "python3-dev", "gcc", "libc-dev"] 